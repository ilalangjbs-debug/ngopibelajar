<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NgopiBelajar</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #ffffff;
    color: #111;
}

.admin-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    font-size: 12px;
    padding: 5px 10px;
    background: none;
    border: 1px solid #ccc;
    color: #555;
    border-radius: 6px;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 30px 20px;
    text-align: center;
}

.card {
    padding: 10px 0;
}

button {
    padding: 12px;
    margin: 10px 0;
    width: 100%;
    border-radius: 8px;
    background: #111;
    color: white;
    font-size: 15px;
    border: none;
}

button.secondary {
    background: none;
    color: #555;
    border: 1px solid #ddd;
}

input, select {
    padding: 12px;
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-top: 10px;
}

.shot-box {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.hidden { display: none; }
</style>

</head>

<body>

<button class="admin-btn" onclick="adminLogin()">Admin</button>

<div class="container">

<div id="landing" class="card">
    <h2>NgopiBelajar</h2>
    <p>Kopi sederhana untuk fokus yang luar biasa</p>
    <button onclick="showMenu()">Pesan</button>
</div>

<div id="menu" class="hidden card">
    <p>Aren Latte - 15000</p>
    <button onclick="selectMenu('Aren Latte',15000)">Pilih</button>

    <p>Caramel Macchiato - 15000</p>
    <button onclick="selectMenu('Caramel Macchiato',15000)">Pilih</button>

    <button class="secondary" onclick="backLanding()">Kembali</button>
</div>

<div id="custom" class="hidden card">
    <p>Gula</p>
    <select id="gula">
        <option>Tanpa gula</option>
        <option>Less</option>
        <option selected>Normal</option>
    </select>

    <p>Es</p>
    <select id="es">
        <option>Less</option>
        <option selected>Normal</option>
    </select>

    <p>Shot</p>
    <div class="shot-box">
        <button onclick="kurangShot()">-</button>
        <span id="shot">1</span>
        <button onclick="tambahShot()">+</button>
    </div>

    <button onclick="lanjutNama()">Lanjut</button>
</div>

<div id="namaPage" class="hidden card">
    <input id="nama" placeholder="Nama">
    <button onclick="order()">Order</button>
</div>

<div id="success" class="hidden card">
    <p id="ringkasan"></p>
    <button onclick="resetAll()">Pesan Lagi</button>
</div>

</div>

<script>

let selectedMenu="", harga=0, shot=1;

function showMenu(){
document.getElementById("landing").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

function backLanding(){
document.getElementById("menu").classList.add("hidden");
document.getElementById("landing").classList.remove("hidden");
}

function selectMenu(n,h){
selectedMenu=n; harga=h;
document.getElementById("menu").classList.add("hidden");
document.getElementById("custom").classList.remove("hidden");
}

function tambahShot(){ if(shot<4){shot++;updateShot();}}
function kurangShot(){ if(shot>1){shot--;updateShot();}}

function updateShot(){
document.getElementById("shot").innerText=shot;
}

function lanjutNama(){
document.getElementById("custom").classList.add("hidden");
document.getElementById("namaPage").classList.remove("hidden");
}

function order(){
let nama=document.getElementById("nama").value;
if(!nama){alert("Isi nama"); return;}

let gula=document.getElementById("gula").value;
let es=document.getElementById("es").value;

let total=harga+(shot-1)*5000;

document.getElementById("namaPage").classList.add("hidden");
document.getElementById("success").classList.remove("hidden");

document.getElementById("ringkasan").innerText=
nama+" pesan "+selectedMenu+" ("+shot+" shot) Rp"+total;
}

function resetAll(){
shot=1;
document.getElementById("shot").innerText=1;
document.getElementById("landing").classList.remove("hidden");
document.getElementById("success").classList.add("hidden");
}

function adminLogin(){
let pass=prompt("Password:");
if(pass==="3273"){alert("Admin OK");}
}

</script>

</body>
</html>
